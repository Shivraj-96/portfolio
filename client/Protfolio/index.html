<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO (fallbacks before React loads) ── -->
    <title>Shivraj Shinde | Full Stack Developer</title>
    <meta name="description"
      content="Full Stack Developer skilled in React, Node.js, MongoDB. Building fast, beautiful web applications." />
    <meta name="author"   content="Shivraj Shinde" />
    <meta name="robots"   content="index, follow" />
    <link rel="canonical" href="https://shivrajshinde.dev/" />

    <!-- ── Open Graph ── -->
    <meta property="og:type"         content="website" />
    <meta property="og:title"        content="Shivraj Shinde | Full Stack Developer" />
    <meta property="og:description"  content="Full Stack Developer skilled in React, Node.js, MongoDB." />
    <meta property="og:url"          content="https://shivrajshinde.dev/" />
    <meta property="og:image"        content="https://shivrajshinde.dev/og-image.png" />

    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"    content="Shivraj Shinde" />
    <meta property="og:locale"       content="en_US" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Shivraj Shinde | Full Stack Developer" />
    <meta name="twitter:description" content="Full Stack Developer skilled in React, Node.js, MongoDB." />
    <meta name="twitter:image"       content="https://shivrajshinde.dev/og-image.png" />

    <!-- ── Theme & PWA ── -->
    <meta name="theme-color"         content="#6366f1" />
    <link rel="icon"                 type="image/svg+xml" href="/favicon.svg" />
    <link rel="sitemap"              type="application/xml" href="/sitemap.xml" />

    <!-- ── Structured Data: Person schema (helps Google) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Shivraj Shinde",
      "url": "https://shivrajshinde.dev",
      "jobTitle": "Full Stack Developer",
      "description": "Full Stack Developer skilled in React, Node.js, and MongoDB.",

        "https://github.com/shivrajshinde",
        "https://linkedin.com/in/shivrajshinde"
      ],
      "knowsAbout": ["React", "Node.js", "MongoDB", "JavaScript", "Express", "CSS"]
    }
    </script>

    <!-- ── Font Awesome ── -->
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
